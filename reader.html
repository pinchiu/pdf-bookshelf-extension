<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader - Visual Bookshelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #0f172a; font-family: 'Outfit', sans-serif; }
      .back-bar { position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(15, 23, 42, 0.9); z-index: 100; display: flex; align-items: center; padding: 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
      #back-btn { background: transparent; border: none; color: #f8fafc; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-family: inherit; }
      #back-btn:hover { color: #3b82f6; }
      #back-btn:disabled { color: #475569; cursor: not-allowed; }
      #pdf-iframe { position: absolute; top: 50px; left: 0; width: 100%; height: calc(100vh - 50px); border: none; background: #525659; }
      .hidden { display: none !important; }
      .overlay { position: absolute; top: 50px; left: 0; width: 100%; height: calc(100vh - 50px); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; z-index: 50; }
    </style>
  </head>
  <body>
    <div class="back-bar">
      <button id="back-btn" title="Back to Bookshelf">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Back to Bookshelf</span>
      </button>
      <span id="book-title" style="margin-left: 20px; color: #94a3b8; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;">Loading...</span>
    </div>

    <div id="permission-overlay" class="overlay hidden">
      <h2 style="margin-bottom:1rem; color:#f8fafc;">Access Permission Required</h2>
      <p style="margin-bottom:2rem; color:#94a3b8; max-width:400px; text-align:center;">Chrome requires explicit permission to read this local file.</p>
      <button id="grant-permission-btn" style="padding: 1rem 2rem; font-size:1.1rem; border-radius:8px; border:none; background:#3b82f6; color:white; cursor:pointer; font-weight:bold;">Grant Permission</button>
    </div>

    <div id="loading-overlay" class="overlay">
      <h2 style="color:white; font-weight: 400;">Loading PDF Reader...</h2>
    </div>

    <iframe id="pdf-iframe" class="hidden"></iframe>

    <script type="module" src="./src/reader.js"></script>
  </body>
</html>
